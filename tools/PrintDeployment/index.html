<div class="pd-tool">
  <h1>Print Deployment Generator</h1>
  <p class="pd-muted">Build a configured PSADT printer deployment package directly in the browser.</p>

  <section class="pd-card">
    <h2>Add server</h2>
    <div class="pd-row">
      <input id="serverName" type="text" placeholder="print01.contoso.com" autocomplete="off">
      <button id="addServerBtn" type="button">Add server</button>
    </div>
  </section>

  <section class="pd-card">
    <h2>Add printer</h2>
    <div class="pd-row">
      <select id="serverSelect"></select>
      <input id="printerName" type="text" placeholder="Printer share name" autocomplete="off">
      <button id="addPrinterBtn" type="button">Add printer</button>
    </div>
  </section>

  <div class="pd-grid">
    <section class="pd-card">
      <h2>Editor</h2>
      <div id="editor" class="pd-editor"></div>
    </section>

    <section class="pd-card">
      <h2>Visualizer</h2>
      <div id="visualizer" class="pd-visualizer"></div>
    </section>
  </div>

  <section class="pd-card">
    <h2>Generated PowerShell data</h2>
    <textarea id="generatedOutput" readonly></textarea>
    <div class="pd-row pd-actions">
      <button id="copyBtn" type="button">Copy to clipboard</button>
      <button id="downloadBtn" type="button">Download configured PSADT package</button>
    </div>
    <p id="status" class="pd-muted"></p>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="{{ '/tools/printdeployment/printdeployment.js' | relative_url }}"></script>
