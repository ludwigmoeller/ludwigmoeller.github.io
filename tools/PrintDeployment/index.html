<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Print Deployment Generator</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --panel: #f5f5f5;
      --border: #cccccc;
      --hover: #e0e0e0;
      --muted: #666666;
    }

    body.dark {
      --bg: #0f1115;
      --text: #e6e6e6;
      --panel: #1b1e24;
      --border: #333;
      --hover: #2f3542;
      --muted: #aaaaaa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    input, select, textarea {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px;
      border-radius: 4px;
    }

    textarea {
      width: 100%;
      height: 280px;
      font-family: ui-monospace, monospace;
    }

    button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: var(--hover);
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 16px;
    }

    .panel {
      background: var(--panel);
      padding: 12px;
      border-radius: 6px;
    }

    .tree-server {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .tree-printer {
      margin-left: 24px;
      padding: 4px;
      border-radius: 4px;
    }

    .tree-server input,
    .tree-printer input {
      border: none;
      background: transparent;
      color: inherit;
      font-family: inherit;
      width: 260px;
    }

    .tree-server input:focus,
    .tree-printer input:focus {
      outline: 1px solid var(--border);
      background: var(--bg);
    }

    .muted {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .print-preview {
      display: flex;
      background: #1e1e1e;
      color: #ffffff;
      border-radius: 6px;
      overflow-x: auto;
      min-height: 140px;
    }

    .print-column {
      min-width: 300px;
      border-right: 1px solid #333;
    }

    .print-item {
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      cursor: default;
    }

    .print-item:hover {
      background: #333;
    }

    .status {
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .danger {
      color: #ff8888;
    }

    .success {
      color: #7ee787;
    }
  </style>
</head>

<body>

<h1>Print Deployment Generator</h1>

<div class="row">
  <button onclick="toggleTheme()">🌙 / ☀️ Theme</button>
  <span class="muted">The tool loads ./PrintDeployment.zip from this folder.</span>
</div>

<h2>Add server</h2>
<div class="row">
  <input id="serverName" placeholder="Print server, e.g. p-rps01.bdo.local" />
  <button onclick="addServer()">Add server</button>
</div>

<h2>Add printer</h2>
<div class="row">
  <select id="serverSelect"></select>
  <input id="printerName" placeholder="Printer share name, e.g. Cloudprint_farve" />
  <button onclick="addPrinter()">Add printer</button>
</div>

<div class="layout">

  <div class="panel">
    <h2>Editor</h2>
    <div id="tree"></div>
  </div>

  <div class="panel">
    <h2>Visualizer</h2>
    <div id="preview"></div>
  </div>

</div>

<h2>Generated PowerShell Preview</h2>
<textarea id="output" readonly></textarea>

<div class="row">
  <button onclick="downloadPackage()">Download PSADT package</button>
</div>

<div id="status" class="status"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
